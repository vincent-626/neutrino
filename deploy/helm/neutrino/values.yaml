replicaCount: 1

image:
  repository: ghcr.io/vincent-626/neutrino
  pullPolicy: IfNotPresent
  tag: ""  # defaults to Chart.appVersion

# Loki connection
loki:
  url: http://loki:3100

# Search configuration
config:
  maxLogLines: 5000
  topK: 25
  cacheTTLSeconds: 21600

service:
  port: 8400

resources:
  requests:
    cpu: "1"
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# Prometheus Operator ServiceMonitor
serviceMonitor:
  enabled: false
  namespace: ""        # defaults to release namespace
  interval: 30s
  labels: {}

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
