apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "neutrino.fullname" . }}
  labels:
    {{- include "neutrino.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "neutrino.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "neutrino.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: neutrino
          image: "{{ .Values.image.repository }}:{{ include "neutrino.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8400
              protocol: TCP
          env:
            - name: LOKI_URL
              value: {{ .Values.loki.url | quote }}
            - name: MAX_LOG_LINES
              value: {{ .Values.config.maxLogLines | quote }}
            - name: TOP_K
              value: {{ .Values.config.topK | quote }}
            - name: CACHE_TTL_SECONDS
              value: {{ .Values.config.cacheTTLSeconds | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
