name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/neutrino
  CHART_REPO: ${{ github.repository_owner }}/charts

permissions:
  contents: write
  packages: write

jobs:
  build-image:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-plugin:
    name: Build Grafana plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: plugin/go.mod
          cache-dependency-path: plugin/go.sum

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: plugin/pnpm-lock.yaml

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: Install frontend deps
        working-directory: plugin
        run: pnpm install --frozen-lockfile

      - name: Build Go binaries
        working-directory: plugin
        run: mage linux && mage linuxARM64

      - name: Build frontend
        working-directory: plugin
        run: pnpm run build

      - name: Package plugin
        run: |
          VERSION=${{ github.ref_name }}
          zip -r neutrino-app-${VERSION}.zip plugin/dist/

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: neutrino-plugin
          path: neutrino-app-*.zip

  publish-chart:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs: [build-image, build-plugin]
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Set chart version
        run: |
          VERSION=${{ github.ref_name }}
          # Strip leading 'v' for semver in Chart.yaml
          sed -i "s/^version:.*/version: ${VERSION#v}/" deploy/helm/neutrino/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION#v}\"/" deploy/helm/neutrino/Chart.yaml

      - name: Package and push chart
        run: |
          helm package deploy/helm/neutrino
          helm push neutrino-*.tgz oci://${{ env.REGISTRY }}/${{ env.CHART_REPO }}

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [build-plugin, publish-chart]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: neutrino-plugin

      - uses: softprops/action-gh-release@v2
        with:
          files: neutrino-app-*.zip
          generate_release_notes: true
